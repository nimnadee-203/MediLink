apiVersion: v1
kind: ConfigMap
metadata:
  name: medisync-config
  labels:
    app: medisync
data:
  # --- Service URLs (Internal K8s DNS) ---
  PATIENT_SERVICE_URL: "http://patient-service:8002"
  APPOINTMENT_SERVICE_URL: "http://appointment-service:8004"
  DOCTOR_SERVICE_URL: "http://doctor-service:4000"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8006"
  AUTH_SERVICE_URL: "http://auth-service:8008"
  PAYMENT_SERVICE_URL: "http://payment-service:8019"
  SYMPTOM_CHECKER_SERVICE_URL: "http://symptom-checker-service:8007"
  TELEMEDICINE_SERVICE_URL: "http://telemedicine-service:8007"

  # --- Common Ports ---
  PORT_DOCTOR: "4000"
  PORT_PATIENT: "8002"
  PORT_APPOINTMENT: "8004"
  PORT_NOTIFICATION: "8006"
  PORT_AUTH: "8008"
  PORT_PAYMENT: "8019"
  PORT_GATEWAY: "8000"
  PORT_SYMPTOM: "8007"
  PORT_TELEMEDICINE: "8007"

  # --- Database Names (Used by some legacy lookups) ---
  APPOINTMENT_DB_NAME: "appointments"
  DOCTOR_DB_NAME: "doctors"
  PATIENT_DB_NAME: "patients"
  ADMIN_DB_NAME: "admin"
  NOTIFICATION_DB_NAME: "notification-db"

  # --- Email Provider Config ---
  EMAIL_PROVIDER: "custom"
  SMTP_HOST: "smtp-relay.brevo.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  EMAIL_FROM: "yasangashanuka33@gmail.com"
