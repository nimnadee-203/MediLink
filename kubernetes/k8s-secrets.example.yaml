apiVersion: v1
kind: Secret
metadata:
  name: medisync-secrets
  labels:
    app: medisync
type: Opaque
stringData:
  # --- MongoDB Atlas Connection Strings ---
  MONGODB_URL_AUTH: "mongodb+srv://<USERNAME>:<PASSWORD>@<CLUSTER_URL>/auth?retryWrites=true&w=majority"
  MONGODB_URL_PATIENTS: "mongodb+srv://<USERNAME>:<PASSWORD>@<CLUSTER_URL>/patients?retryWrites=true&w=majority"
  MONGODB_URL_APPOINTMENTS: "mongodb+srv://<USERNAME>:<PASSWORD>@<CLUSTER_URL>/appointments?retryWrites=true&w=majority"
  MONGODB_URL_DOCTORS: "mongodb+srv://<USERNAME>:<PASSWORD>@<CLUSTER_URL>/doctors?retryWrites=true&w=majority"
  MONGODB_URL_NOTIFICATIONS: "mongodb+srv://<USERNAME>:<PASSWORD>@<CLUSTER_URL>/notifications?retryWrites=true&w=majority"
  MONGODB_URL_PAYMENTS: "mongodb+srv://<USERNAME>:<PASSWORD>@<CLUSTER_URL>/payments?retryWrites=true&w=majority"
  MONGODB_URL_SYMPTOM: "mongodb+srv://<USERNAME>:<PASSWORD>@<CLUSTER_URL>/symptom_checker?retryWrites=true&w=majority"
  MONGODB_URL_TELEMEDICINE: "mongodb+srv://<USERNAME>:<PASSWORD>@<CLUSTER_URL>/telemedicine?retryWrites=true&w=majority"

  # --- Authentication ---
  JWT_SECRET: "YOUR_JWT_SECRET"
  ADMIN_EMAIL: "admin@example.com"
  ADMIN_PASSWORD: "YOUR_ADMIN_PASSWORD"
  
  # --- API Keys (External Services) ---
  STRIPE_SECRET_KEY: "sk_test_YOUR_STRIPE_SECRET_KEY"
  CLERK_SECRET_KEY: "sk_test_YOUR_CLERK_SECRET_KEY"
  
  # --- Email Credentials ---
  EMAIL_USER: "YOUR_EMAIL@example.com"
  EMAIL_PASSWORD: "YOUR_EMAIL_PASSWORD"
  
  # --- Internal Secrets ---
  NOTIFICATION_INTERNAL_SECRET: "YOUR_INTERNAL_NOTIFICATION_SECRET"
  
  # --- Media Storage ---
  CLOUDINARY_URL: "cloudinary://YOUR_API_KEY:YOUR_API_SECRET@YOUR_CLOUD_NAME"
  CLOUDINARY_NAME: "YOUR_CLOUD_NAME"
  CLOUDINARY_API_KEY: "YOUR_API_KEY"
  CLOUDINARY_SECRET_KEY: "YOUR_API_SECRET"
