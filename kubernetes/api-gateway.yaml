apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: medisync-api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: medisync-config
              key: PORT_GATEWAY
        - name: PATIENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: medisync-config
              key: PATIENT_SERVICE_URL
        - name: APPOINTMENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: medisync-config
              key: APPOINTMENT_SERVICE_URL
        - name: DOCTOR_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: medisync-config
              key: DOCTOR_SERVICE_URL
        - name: CLERK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: medisync-secrets
              key: CLERK_SECRET_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: LoadBalancer
