services:
  # --- API GATEWAY ---
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    env_file: ./api-gateway/.env
    depends_on:
      - auth-service
      - patient-service
      - appointment-service
      - doctor-service
      - notification-service
      - payment-service
      - symptom-checker-service
    networks:
      - medilink-network

  # --- BACKEND SERVICES ---
  auth-service:
    build: ./services/auth-service
    ports:
      - "8008:8008"
    env_file: ./services/auth-service/.env
    networks:
      - medilink-network

  patient-service:
    build: ./services/patient-service
    ports:
      - "8002:8002"
    env_file: ./services/patient-service/.env
    environment:
      - NOTIFICATION_SERVICE_URL=http://notification-service:8006
    networks:
      - medilink-network

  appointment-service:
    build: ./services/appointment-service
    ports:
      - "8004:8004"
    env_file: ./services/appointment-service/.env
    environment:
      - NOTIFICATION_SERVICE_URL=http://notification-service:8006
    networks:
      - medilink-network

  doctor-service:
    build: ./services/doctor-service
    ports:
      - "4000:4000"
    env_file: ./services/doctor-service/.env
    environment:
      - NOTIFICATION_SERVICE_URL=http://notification-service:8006
      - APPOINTMENT_SERVICE_URL=http://appointment-service:8004
      - PATIENT_SERVICE_URL=http://patient-service:8002
    networks:
      - medilink-network

  notification-service:
    build: ./services/notification-service
    ports:
      - "8006:8006"
    env_file: ./services/notification-service/.env
    environment:
      - PATIENT_SERVICE_URL=http://patient-service:8002
      - DOCTOR_SERVICE_URL=http://doctor-service:4000
    networks:
      - medilink-network

  payment-service:
    build: ./services/payment-service
    ports:
      - "8019:8019"
    env_file: ./services/payment-service/.env
    networks:
      - medilink-network

  symptom-checker-service:
    build: ./services/symptom-checker-service
    ports:
      - "8010:8010"
    env_file: ./services/symptom-checker-service/.env
    networks:
      - medilink-network

  telemedicine-service:
    build: ./services/telemedicine-service
    ports:
      - "8007:8007"
    env_file: ./services/telemedicine-service/.env
    networks:
      - medilink-network

  # --- FRONTEND APPS (Dev Mode) ---
  client:
    build: ./client
    ports:
      - "5173:5173"
    env_file: ./client/.env
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - medilink-network

  admin:
    build: ./admin
    ports:
      - "5174:5174"
    env_file: ./admin/.env
    volumes:
      - ./admin:/app
      - /app/node_modules
    networks:
      - medilink-network

networks:
  medilink-network:
    driver: bridge
