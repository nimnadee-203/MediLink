version: '3.8'

services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - patient-service

  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8001"

  patient-service:
    build: ./services/patient-service
    ports:
      - "8002:8002"

  # ... more services will be added
